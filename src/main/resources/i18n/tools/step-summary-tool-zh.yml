description: |
  输出步骤总结。在每个步骤结束时使用此工具，汇报当前步骤做了什么、下一步打算做什么以及原因，便于用户查看执行过程。

parameters: |
  {
    "type": "object",
    "properties": {
      "message": {
        "type": "string",
        "description": "要输出和返回的步骤总结，格式示例：\n# 下一步计划\n值\n# 已经做了什么\n值\n# 为什么这么打算\n值\n# 依据哪些要求做出了这个计划\n值"
      }
    },
    "required": ["message"]
  }
