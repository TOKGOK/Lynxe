name: 🏗️ Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./tools/github-actions/setup-deps

      - name: Install tools
        run: make tools

      - name: Build UI
        run: make ui-build

      - name: Build project
        run: make build

      - name: Run tests
        run: make test

      - name: Read VERSION file
        id: version
        run: echo "BUILD_VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Verify executable fat JAR exists
        run: |
          if [ -f "target/lynxe-exec-fat-jar.jar" ]; then
            echo "✅ Executable fat JAR found: target/lynxe-exec-fat-jar.jar"
            ls -lh target/lynxe-exec-fat-jar.jar
          else
            echo "❌ JAR file not found: target/lynxe-exec-fat-jar.jar"
            echo "Files in target directory:"
            ls -la target/*.jar || echo "No JAR files found"
            exit 1
          fi
